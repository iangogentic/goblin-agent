<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="50" fill="#10b981" opacity="0.05"/>
  <circle cx="1100" cy="300" r="80" fill="#10b981" opacity="0.05"/>
  <circle cx="600" cy="50" r="100" fill="#10b981" opacity="0.03"/>
  
  <!-- Goblin face (small) -->
  <g transform="translate(100, 120) scale(0.6)">
    <ellipse cx="100" cy="110" rx="60" ry="65" fill="#10b981"/>
    <ellipse cx="35" cy="90" rx="25" ry="12" fill="#10b981" transform="rotate(-30 35 90)"/>
    <ellipse cx="165" cy="90" rx="25" ry="12" fill="#10b981" transform="rotate(30 165 90)"/>
    <ellipse cx="75" cy="100" rx="17" ry="20" fill="#fef3c7"/>
    <ellipse cx="125" cy="100" rx="17" ry="20" fill="#fef3c7"/>
    <ellipse cx="78" cy="103" rx="7" ry="10" fill="#1e293b"/>
    <ellipse cx="128" cy="103" rx="7" ry="10" fill="#1e293b"/>
    <ellipse cx="100" cy="125" rx="12" ry="10" fill="#047857"/>
    <path d="M75 145 Q100 160 125 145" stroke="#065f46" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Text: GOBLIN -->
  <text x="380" y="180" font-family="Arial, sans-serif" font-size="100" font-weight="bold" fill="url(#textGrad)">
    GOBLIN
  </text>
  
  <!-- Tagline -->
  <text x="380" y="240" font-family="Arial, sans-serif" font-size="28" fill="#94a3b8">
    Chaotic. Smart. Gets the job done.
  </text>
  
  <!-- Subtitle -->
  <text x="380" y="290" font-family="Arial, sans-serif" font-size="20" fill="#64748b">
    Self-improving AI coding agent
  </text>
  
  <!-- Decorative line -->
  <line x1="380" y1="320" x2="800" y2="320" stroke="#10b981" stroke-width="2" opacity="0.5"/>
  
  <!-- Version badge -->
  <rect x="380" y="340" width="80" height="30" rx="15" fill="#10b981" opacity="0.2"/>
  <text x="420" y="360" font-family="Arial, sans-serif" font-size="14" fill="#10b981" text-anchor="middle">v0.1.0</text>
</svg>
